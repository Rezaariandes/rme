<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klikpro RME — Praktek Dokter</title>

    <!-- ═══════════════════════════════════════════════════════════
         KONFIGURASI MINIMAL — Nilai sebenarnya dimuat dari
         Google Sheets (sheet: Konfigurasi) saat app berjalan.
         Hanya APP_URL & BASE_URL yang perlu diubah di sini.
    ═══════════════════════════════════════════════════════════ -->
    <script>
        // ─── WAJIB DIISI: URL Google Apps Script ───
        const APP_URL  = 'https://script.google.com/macros/s/AKfycbxHcyvfQm9KeJYt0Be3d_wo8_OZO9uOyGYf1ELFg0IFZmFG8HHiKM7ulNO4oiS2eycA/exec';
        const BASE_URL = 'https://raw.githubusercontent.com/Rezaariandes/rme/main';

        // ─── NILAI DEFAULT (akan di-override oleh data dari Sheets) ───
        let KLINIK_NAMA   = 'Praktek Dokter';
        let KLINIK_TITLE  = 'Klikpro RME';
        let JABATAN_MEDIS = ['Dokter', 'Admin', 'Paramedis'];

        // AI_KEYS — akan di-override dari Sheets setelah login
        // Isi sementara jika perlu testing sebelum settings dikonfigurasi
        let AI_KEYS = {
            gemini:     ['', '', ''],
            groq:       ['', '', ''],
            openrouter: ['', ''],
            openai:     ['', ''],
            mistral:    ['', ''],
            cohere:     [''],
        };

        // ─── URL Fragment (HTML & JS) ───
        const FRAGMENT_URLS = {
            css:          BASE_URL + '/css/style.css',
            pinLock:      BASE_URL + '/components/pin-lock.html',
            modalRiwayat: BASE_URL + '/components/modal-riwayat.html',
            modalUser:    BASE_URL + '/components/modal-user.html',
            header:       BASE_URL + '/components/header.html',
            nav:          BASE_URL + '/components/nav.html',
            pageDaftar:   BASE_URL + '/pages/page-daftar.html',
            pageMedis:    BASE_URL + '/pages/page-medis.html',
            pageHariIni:  BASE_URL + '/pages/page-hari-ini.html',
            pageUser:     BASE_URL + '/pages/page-user.html',
            pageSettings: BASE_URL + '/pages/page-settings.html',   // ← BARU

            jsUtils:    BASE_URL + '/js/utils.js',
            jsAuth:     BASE_URL + '/js/auth.js',
            jsIcd10:    BASE_URL + '/js/icd10.js',
            jsPasien:   BASE_URL + '/js/pasien.js',
            jsKunj:     BASE_URL + '/js/kunjungan.js',
            jsModal:    BASE_URL + '/js/modal.js',
            jsUser:     BASE_URL + '/js/user.js',
            jsSettings: BASE_URL + '/js/settings.js',               // ← BARU
            jsApp:      BASE_URL + '/js/app.js',
            jsAiRek:    BASE_URL + '/js/ai-rekomendasi.js'
        };
    </script>

    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;0,800;1,700&display=swap" rel="stylesheet">

    <style id="dynamic-style"></style>

    <style>
        #app-loading {
            position: fixed; inset: 0;
            background: linear-gradient(160deg, #f0f6ff 0%, #e8f4ff 100%);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 9999; gap: 16px;
            font-family: 'Sora', sans-serif;
        }
        #app-loading .spinner {
            width: 48px; height: 48px;
            border: 4px solid rgba(59,130,246,0.15);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }
        #app-loading .loading-label { color: #334155; font-weight: 700; font-size: 14px; }
        #app-loading .loading-sub   { color: #64748b; font-size: 11px; font-weight: 500; margin-top: -8px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #app-error {
            display: none; position: fixed; inset: 0; background: #fff;
            flex-direction: column; align-items: center; justify-content: center;
            gap: 12px; z-index: 9999; color: #ef4444;
            text-align: center; padding: 24px;
            font-family: 'Sora', sans-serif;
        }
        #app-error strong { font-size: 1.1rem; }
        #app-error p { font-size: .88rem; max-width: 420px; color: #64748b; line-height: 1.6; }
        #app-error button {
            padding: 10px 28px; background: #3b82f6; color: white;
            border: none; border-radius: 10px;
            font-weight: 700; cursor: pointer;
            font-family: 'Sora', sans-serif;
            margin-top: 8px; font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="app-loading">
        <div class="spinner"></div>
        <p class="loading-label">Menyiapkan Klikpro RME...</p>
        <p class="loading-sub" id="loadingStep">Menghubungkan ke server...</p>
    </div>

    <div id="app-error">
        <div style="font-size:3rem">⚠️</div>
        <strong>Gagal Memuat Aplikasi</strong>
        <p id="err-msg"></p>
        <button onclick="location.reload()">🔄 Coba Lagi</button>
    </div>

    <div id="app-root" style="display:none;">
        <div class="bg-base"></div>
        <div class="bg-mesh"><div class="bg-orb"></div></div>
        <div id="toastContainer"></div>

        <div id="slot-pin-lock"></div>
        <datalist id="list-icd"></datalist>
        <div id="slot-modal-riwayat"></div>
        <div id="slot-modal-user"></div>

        <div id="slot-header"></div>
        <div id="slot-nav"></div>

        <div id="slot-page-daftar"></div>
        <div id="slot-page-medis"></div>
        <div id="slot-page-hari-ini"></div>
        <div id="slot-page-user"></div>
        <div id="slot-page-settings"></div>   <!-- ← BARU -->
    </div>

    <script>
    function setLoadStep(msg) {
        const el = document.getElementById('loadingStep');
        if (el) el.textContent = msg;
    }

    function injectScript(text) {
        const el = document.createElement('script');
        el.textContent = text;
        document.body.appendChild(el);
    }

    async function bootstrap() {
        try {
            setLoadStep('Mengunduh tampilan...');
            const htmlKeys = ['css','pinLock','modalRiwayat','modalUser','header','nav',
                              'pageDaftar','pageMedis','pageHariIni','pageUser','pageSettings'];
            const htmlResults = await Promise.all(
                htmlKeys.map(key =>
                    fetch(FRAGMENT_URLS[key]).then(r => {
                        if (!r.ok) throw new Error('Gagal mengunduh: ' + key);
                        return r.text();
                    })
                )
            );
            const [css, pinLock, modalRiwayat, modalUser, header, nav,
                   pageDaftar, pageMedis, pageHariIni, pageUser, pageSettings] = htmlResults;

            setLoadStep('Memuat antarmuka...');
            document.getElementById('dynamic-style').innerHTML = css;
            document.getElementById('slot-pin-lock').innerHTML        = pinLock;
            document.getElementById('slot-modal-riwayat').innerHTML   = modalRiwayat;
            document.getElementById('slot-modal-user').innerHTML      = modalUser;
            document.getElementById('slot-header').innerHTML          = header;
            document.getElementById('slot-nav').innerHTML             = nav;
            document.getElementById('slot-page-daftar').innerHTML     = pageDaftar;
            document.getElementById('slot-page-medis').innerHTML      = pageMedis;
            document.getElementById('slot-page-hari-ini').innerHTML   = pageHariIni;
            document.getElementById('slot-page-user').innerHTML       = pageUser;
            document.getElementById('slot-page-settings').innerHTML   = pageSettings;  // ← BARU

            // Nama klinik sementara (akan diupdate setelah loadSettings)
            const h1   = document.querySelector('.app-title h1');
            const span = document.querySelector('.app-title span');
            if (h1)   h1.innerText   = KLINIK_TITLE;
            if (span) span.innerText = KLINIK_NAMA;

            setLoadStep('Memuat modul aplikasi...');
            const jsKeys = ['jsUtils','jsAuth','jsIcd10','jsPasien','jsKunj',
                            'jsModal','jsUser','jsSettings','jsApp','jsAiRek'];
            const jsTexts = await Promise.all(
                jsKeys.map(key =>
                    fetch(FRAGMENT_URLS[key]).then(r => {
                        if (!r.ok) throw new Error('Gagal mengunduh modul: ' + key);
                        return r.text();
                    })
                )
            );

            setLoadStep('Menginisialisasi sistem...');
            for (const scriptText of jsTexts) {
                try { injectScript(scriptText); } catch (e) { console.warn('Peringatan:', e); }
            }

            document.getElementById('app-loading').style.display = 'none';
            document.getElementById('app-root').style.display    = 'block';

            if (typeof initApp === 'function') initApp();

        } catch (err) {
            document.getElementById('app-loading').style.display = 'none';
            document.getElementById('app-error').style.display   = 'flex';
            document.getElementById('err-msg').textContent =
                err.message + '. Pastikan koneksi internet aktif dan URL GitHub di konfigurasi sudah benar.';
            console.error('[Klikpro Bootstrap Error]', err);
        }
    }

    window.addEventListener('DOMContentLoaded', bootstrap);
    </script>
</body>
</html>
