    <script>
    function setLoadStep(msg) {
        const el = document.getElementById('loadingStep');
        if (el) el.textContent = msg;
    }

    function injectScript(text) {
        const el = document.createElement('script');
        el.textContent = text;
        document.body.appendChild(el);
    }

    async function bootstrap() {
        try {
            setLoadStep('Mengunduh tampilan...');
            const htmlKeys = ['css','pinLock','modalRiwayat','modalUser','header','nav',
                              'pageDaftar','pageMedis','pageHariIni','pageUser','pageSettings','pageLaporan','pageStok','pageBiaya'];
            const htmlResults = await Promise.all(
                htmlKeys.map(key =>
                    fetch(FRAGMENT_URLS[key]).then(r => {
                        if (!r.ok) throw new Error('Gagal mengunduh: ' + key);
                        return r.text();
                    })
                )
            );
            const [css, pinLock, modalRiwayat, modalUser, header, nav,
                   pageDaftar, pageMedis, pageHariIni, pageUser, pageSettings, pageLaporan, pageStok, pageBiaya] = htmlResults;

            setLoadStep('Memuat antarmuka...');
            document.getElementById('dynamic-style').innerHTML = css;
            document.getElementById('slot-pin-lock').innerHTML        = pinLock;
            document.getElementById('slot-modal-riwayat').innerHTML   = modalRiwayat;
            document.getElementById('slot-modal-user').innerHTML      = modalUser;
            document.getElementById('slot-header').innerHTML          = header;
            document.getElementById('slot-nav').innerHTML             = nav;
            document.getElementById('slot-page-daftar').innerHTML     = pageDaftar;
            document.getElementById('slot-page-medis').innerHTML      = pageMedis;
            document.getElementById('slot-page-hari-ini').innerHTML   = pageHariIni;
            document.getElementById('slot-page-user').innerHTML       = pageUser;
            document.getElementById('slot-page-settings').innerHTML   = pageSettings;
            document.getElementById('slot-page-laporan').innerHTML    = pageLaporan;
            document.getElementById('slot-page-stok').innerHTML       = pageStok;
            document.getElementById('slot-page-biaya').innerHTML      = pageBiaya;

            // Nama klinik sementara (akan diupdate setelah loadSettings di app.js)
            const h1   = document.querySelector('.app-title h1');
            const span = document.querySelector('.app-title span');
            if (h1)   h1.innerText   = KLINIK_TITLE;
            if (span) span.innerText = KLINIK_NAMA;

            setLoadStep('Memuat modul aplikasi...');
            // PENTING: Urutan array ini menentukan urutan eksekusi.
            // jsSettings HARUS sebelum jsAuth karena auth.js memanggil
            // applyModuleAccess() yang didefinisikan di settings.js.
            const jsKeys = ['jsUtils','jsSupabase','jsSupabaseStok','jsSupabaseBiaya','jsSettings','jsAuth','jsIcd10',
                            'jsPasien','jsKunj','jsModal','jsUser','jsLaporan','jsStok','jsBiaya','jsApp','jsAiRek'];
            const jsTexts = await Promise.all(
                jsKeys.map(key =>
                    fetch(FRAGMENT_URLS[key]).then(r => {
                        if (!r.ok) throw new Error('Gagal mengunduh modul: ' + key);
                        return r.text();
                    })
                )
            );

            setLoadStep('Menginisialisasi sistem...');
            // Script diinjeksi secara berurutan agar dependensi antar modul terjaga
            for (const scriptText of jsTexts) {
                try { injectScript(scriptText); } catch (e) { console.warn('Peringatan:', e); }
            }

            document.getElementById('app-loading').style.display = 'none';
            document.getElementById('app-root').style.display    = 'block';

            if (typeof initApp === 'function') initApp();

        } catch (err) {
            document.getElementById('app-loading').style.display = 'none';
            document.getElementById('app-error').style.display   = 'flex';
            document.getElementById('err-msg').textContent =
                err.message + '. Pastikan koneksi internet aktif dan URL GitHub di konfigurasi sudah benar.';
            console.error('[Klikpro Bootstrap Error]', err);
        }
    }

    window.addEventListener('DOMContentLoaded', bootstrap);
    </script>

    <!-- ═══════════════════════════════════════════════════════════
         PATCH LOKAL — Override fungsi dari GitHub yang outdated
         Dieksekusi setelah bootstrap selesai (semua modul sudah load)
    ═══════════════════════════════════════════════════════════ -->
    <script>
    // Tunggu sampai initApp selesai, lalu terapkan semua patch
    (function applyLocalPatches() {
        const MAX_WAIT = 8000;
        const INTERVAL = 200;
        let elapsed = 0;

        const interval = setInterval(() => {
            elapsed += INTERVAL;
            // Tunggu sampai sb_saveKunjungan tersedia (semua modul sudah inject)
            if (typeof sb_saveKunjungan !== 'function' && elapsed < MAX_WAIT) return;
            clearInterval(interval);

            // ── PATCH 1: Jabatan lengkap ──────────────────────────────────
            // Override _isiFormDariSettings agar fallback jabatan mencakup semua jabatan baru
            if (typeof _isiFormDariSettings === 'function') {
                const _orig_isiForm = _isiFormDariSettings;
                window._isiFormDariSettings = function(s) {
                    _orig_isiForm(s);
                    // Jika jabatan_medis di DB masih value lama, paksa isi semua jabatan
                    const jabatanEl = document.getElementById('cfg_jabatan_medis');
                    if (jabatanEl) {
                        const current = jabatanEl.value || '';
                        const jabatanBaru = ['Apoteker', 'Kasir', 'ATLM'];
                        const perluUpdate = jabatanBaru.some(j => !current.includes(j));
                        if (perluUpdate) {
                            const jabList = current.split(',').map(j => j.trim()).filter(j => j);
                            jabatanBaru.forEach(j => { if (!jabList.includes(j)) jabList.push(j); });
                            jabatanEl.value = jabList.join(', ');
                        }
                    }
                };
            }

            // Override _fallbackDariKonstanta agar pakai jabatan lengkap
            if (typeof _fallbackDariKonstanta === 'function') {
                window._fallbackDariKonstanta = function() {
                    const _setVal = (id, val) => { const el = document.getElementById(id); if (el) el.value = val; };
                    _setVal('cfg_klinik_nama',  typeof KLINIK_NAMA  !== 'undefined' ? KLINIK_NAMA  : '');
                    _setVal('cfg_klinik_title', typeof KLINIK_TITLE !== 'undefined' ? KLINIK_TITLE : '');
                    _setVal('cfg_jabatan_medis', 'Dokter, Admin, Paramedis, Apoteker, Kasir, ATLM');
                    if (typeof _renderDokterList  === 'function') _renderDokterList();
                    if (typeof _renderAiKeys      === 'function') _renderAiKeys({});
                    if (typeof _initModuleAccess  === 'function') _initModuleAccess();
                    if (typeof _loadLabAktif      === 'function') _loadLabAktif({});
                };
            }

            // ── PATCH 2: saveAll — Simpan Rekam Medis ─────────────────────
            window.saveAll = async function() {
                const btn = document.getElementById('btnSave');
                if (btn) { btn.disabled = true; btn.innerText = '⏳ Menyimpan...'; }

                try {
                    if (!currentPasienId || currentPasienId === 'null') {
                        if (typeof showToast === 'function') showToast('⚠️ Data pasien tidak ditemukan. Daftar ulang dari halaman Daftar.', 'warning');
                        return;
                    }

                    if (typeof validasiNilaiVital === 'function') {
                        const vErr = validasiNilaiVital();
                        if (vErr && vErr.length > 0) {
                            if (typeof showToast === 'function') showToast('⚠️ ' + vErr[0], 'warning');
                            return;
                        }
                    }

                    const $ = id => document.getElementById(id);
                    const today     = new Date();
                    const tzOffset  = today.getTimezoneOffset() * 60000;
                    const localDate = (new Date(today.getTime() - tzOffset)).toISOString().slice(0, 10);
                    const localTime = String(today.getHours()).padStart(2,'0') + ':' + String(today.getMinutes()).padStart(2,'0');

                    const sistol  = $('sistol')  ? $('sistol').value.trim()  : '';
                    const diastol = $('diastol') ? $('diastol').value.trim() : '';
                    const td      = (sistol && diastol) ? `${sistol}/${diastol}` : (sistol || diastol || '');

                    const diag1 = $('diagnosa')  ? $('diagnosa').value.trim()  : '';
                    const diag2 = $('diagnosa2') ? $('diagnosa2').value.trim() : '';

                    const suratSakit = ($('suratSakit') && $('suratSakit').checked) ? 'YA' : null;
                    const userId = (typeof loggedInUser !== 'undefined' && loggedInUser) ? loggedInUser.id : null;

                    const payload = {
                        pasienId:    currentPasienId,
                        kunjunganId: currentKunjunganId,
                        localDate,   localTime,
                        userId,
                        nama:     $('nama')      ? $('nama').value.trim()      : '',
                        nik:      $('nik')       ? $('nik').value.trim()       : '',
                        jk:       $('jk')        ? $('jk').value               : 'L',
                        tgl_lahir:$('tgl_lahir') ? $('tgl_lahir').value.trim() : '',
                        alamat:   $('alamat')    ? $('alamat').value.trim()    : '',
                        alergi:   $('alergi')    ? $('alergi').value.trim()    : '',
                        td,
                        nadi:     $('nadi')  ? $('nadi').value  : '',
                        suhu:     $('suhu')  ? $('suhu').value  : '',
                        rr:       $('rr')    ? $('rr').value    : '',
                        bb:       $('bb')    ? $('bb').value    : '',
                        tb:       $('tb')    ? $('tb').value    : '',
                        lab_gds:  $('lab_gds')  ? $('lab_gds').value  : '',
                        lab_chol: $('lab_chol') ? $('lab_chol').value : '',
                        lab_ua:   $('lab_ua')   ? $('lab_ua').value   : '',
                        lab_hb:         $('lab_hb')         ? $('lab_hb').value         : '',
                        lab_trombosit:  $('lab_trombosit')  ? $('lab_trombosit').value  : '',
                        lab_leukosit:   $('lab_leukosit')   ? $('lab_leukosit').value   : '',
                        lab_eritrosit:  $('lab_eritrosit')  ? $('lab_eritrosit').value  : '',
                        lab_hematokrit: $('lab_hematokrit') ? $('lab_hematokrit').value : '',
                        lab_hiv:        $('lab_hiv')        ? $('lab_hiv').value        : '',
                        lab_sifilis:    $('lab_sifilis')    ? $('lab_sifilis').value    : '',
                        lab_hepatitis:  $('lab_hepatitis')  ? $('lab_hepatitis').value  : '',
                        lab_hdl:  $('lab_hdl')  ? $('lab_hdl').value  : '',
                        lab_ldl:  $('lab_ldl')  ? $('lab_ldl').value  : '',
                        lab_tg:   $('lab_tg')   ? $('lab_tg').value   : '',
                        lab_gdp:  $('lab_gdp')  ? $('lab_gdp').value  : '',
                        lab_hba1c:$('lab_hba1c')? $('lab_hba1c').value: '',
                        lab_sgot: $('lab_sgot') ? $('lab_sgot').value : '',
                        lab_sgpt: $('lab_sgpt') ? $('lab_sgpt').value : '',
                        lab_ureum:    $('lab_ureum')    ? $('lab_ureum').value    : '',
                        lab_creatinin:$('lab_creatinin')? $('lab_creatinin').value: '',
                        keluhan:  $('keluhan') ? $('keluhan').value  : '',
                        fisik:    $('fisik')   ? $('fisik').value    : '',
                        diagnosa: diag1,
                        diagnosa2: diag2,
                        terapi:   $('terapi')  ? $('terapi').value   : '',
                        suratSakit
                    };

                    const result = await sb_saveKunjungan(payload);

                    if (result && result.kunjunganId) {
                        currentKunjunganId = result.kunjunganId;
                        localStorage.setItem('cK_id', currentKunjunganId);
                    }

                    // Simpan resep jika modul stok aktif
                    if (window._stokAktif && currentKunjunganId && typeof _getResepItems === 'function') {
                        try {
                            const resepItems = _getResepItems();
                            if (resepItems && resepItems.length > 0) {
                                await sb_saveResep(currentKunjunganId, resepItems);
                            }
                        } catch(e) { console.warn('[saveAll] Resep gagal:', e.message); }
                    }

                    // Update cache kunjunganHariIni
                    if (typeof kunjunganHariIni !== 'undefined' && currentKunjunganId) {
                        const isSelesai = !!(diag1 && payload.terapi);
                        const kIdx = kunjunganHariIni.findIndex(x => x.id === currentKunjunganId);
                        if (kIdx !== -1) {
                            kunjunganHariIni[kIdx].status  = isSelesai ? 'Selesai' : 'Menunggu';
                            kunjunganHariIni[kIdx].td      = td;
                            kunjunganHariIni[kIdx].suhu    = payload.suhu;
                            kunjunganHariIni[kIdx].nadi    = payload.nadi;
                            kunjunganHariIni[kIdx].keluhan = payload.keluhan;
                            kunjunganHariIni[kIdx].diag    = diag1;
                        }
                    }

                    if (typeof showToast === 'function') showToast('✅ Rekam medis berhasil disimpan!', 'success');

                    // Buka modal tagihan jika modul biaya aktif DAN diagnosa sudah diisi
                    // BUG-D FIX: sebelumnya tagihan muncul bahkan saat diagnosa kosong
                    if (window._biayaAktif && currentKunjunganId && diag1 && typeof openModalTagihan === 'function') {
                        try {
                            const namaDisplay = $('infoPasienNama') ? $('infoPasienNama').innerText : payload.nama;
                            await openModalTagihan(currentKunjunganId, currentPasienId, namaDisplay, localDate, payload);
                        } catch(e) { console.warn('[saveAll] Modal tagihan gagal:', e.message); }
                    }

                    // Refresh riwayat pasien
                    try {
                        if (currentPasienId && typeof _sbFetch === 'function') {
                            const riwayatRows = await _sbFetch(
                                `kunjungan?pasien_id=eq.${currentPasienId}&order=tgl.desc,waktu.desc&select=*`
                            );
                            if (!window._usersCache || window._usersCache.length === 0) {
                                window._usersCache = await _sbFetch('users?select=id,nama,jabatan&order=nama.asc').catch(() => []);
                            }
                            currentRiwayat = riwayatRows.map(r => {
                                const du = r.user_id ? (window._usersCache||[]).find(u => u.id === r.user_id && u.jabatan?.toLowerCase() === 'dokter') : null;
                                return {
                                    id: r.id, tgl: r.tgl, waktu: r.waktu,
                                    td: r.td, nadi: r.nadi, suhu: r.suhu, rr: r.rr, bb: r.bb, tb: r.tb,
                                    keluhan: r.keluhan, fisik: r.fisik,
                                    lab_gds: r.lab_gds, lab_chol: r.lab_chol, lab_ua: r.lab_ua,
                                    diag: r.diagnosa, diagnosa2: r.diagnosa2,
                                    terapi: r.terapi, surat_sakit: r.surat_sakit,
                                    status: r.status, user_id: r.user_id,
                                    status_obat: !!r.status_obat, status_bayar: !!r.status_bayar,
                                    dokterNama: du ? du.nama : ''
                                };
                            });
                            localStorage.setItem('cP_riwayat', JSON.stringify(currentRiwayat));
                            if (typeof renderRiwayatList === 'function') renderRiwayatList(currentRiwayat, 'historyListMedis');
                        }
                    } catch(e) { console.warn('[saveAll] Refresh riwayat gagal:', e.message); }

                } catch(e) {
                    console.error('[saveAll] Error:', e);
                    if (typeof showToast === 'function') showToast('❌ Gagal menyimpan: ' + (e.message || 'Cek koneksi internet'), 'error');
                } finally {
                    if (btn) { btn.disabled = false; btn.innerText = '✓ Simpan Rekam Medis'; }
                }
            };

            // ── PATCH 3: Fix riwayat fetch (hapus join dokter yang salah) ──
            if (typeof bukaRekamMedisHariIni === 'function') {
                const _origBuka = bukaRekamMedisHariIni;
                window.bukaRekamMedisHariIni = async function(kId) {
                    // Patch _sbFetch untuk blok ini: intercept query yg salah
                    // Caranya: override sementara lalu restore
                    await _origBuka(kId);
                };
            }

            // ── PATCH 4: Status badge persist ke Supabase (bukan localStorage) ──
            window._statusCache = window._statusCache || {};

            window._getStatusKunjungan = function(kId) {
                if (window._statusCache[kId]) return window._statusCache[kId];
                const k = (typeof kunjunganHariIni !== 'undefined' ? kunjunganHariIni : []).find(x => x.id === kId);
                if (k) {
                    const s = { obat: !!k.status_obat, bayar: !!k.status_bayar };
                    window._statusCache[kId] = s;
                    return s;
                }
                return { obat: false, bayar: false };
            };

            window.toggleStatusKunjungan = async function(event, kId, field) {
                event.stopPropagation();
                const s   = window._getStatusKunjungan(kId);
                const val = !s[field];
                s[field]  = val;
                window._statusCache[kId] = s;
                const k = (typeof kunjunganHariIni !== 'undefined' ? kunjunganHariIni : []).find(x => x.id === kId);
                if (k) k[field === 'obat' ? 'status_obat' : 'status_bayar'] = val;

                const badge = document.getElementById(`badge_${field}_${kId}`);
                if (badge) {
                    const active = val;
                    const isObat = field === 'obat';
                    badge.innerHTML = active
                        ? `<span style="font-size:10px;">${isObat ? '💊' : '💰'}</span> ${isObat ? 'Resep' : 'Bayar'} ✓`
                        : `<span style="font-size:10px;">✕</span> ${isObat ? 'Resep' : 'Bayar'}`;
                    const base = 'cursor:pointer;display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;';
                    badge.style.cssText = base + (active
                        ? (isObat ? 'background:#d1fae5;color:#065f46;border:1px solid #6ee7b7;' : 'background:#dbeafe;color:#1e40af;border:1px solid #93c5fd;')
                        : 'background:#fee2e2;color:#dc2626;border:1px solid #fca5a5;');
                }

                const label = field === 'obat' ? 'Resep' : 'Pembayaran';
                if (typeof showToast === 'function') showToast(val ? `✅ ${label} sudah ditandai` : `↩️ ${label} dibatalkan`, val ? 'success' : 'info');

                try {
                    const col = field === 'obat' ? 'status_obat' : 'status_bayar';
                    await _sbFetch(`kunjungan?id=eq.${kId}`, { method: 'PATCH', body: { [col]: val }, prefer: 'return=minimal' });
                } catch(e) { console.warn('[Klikpro] Gagal simpan status:', e.message); }
            };

            console.log('[Klikpro] ✅ Local patches applied: jabatan, saveAll, status badge, riwayat fetch');
        }, INTERVAL);
    })();
    </script>
</body>
