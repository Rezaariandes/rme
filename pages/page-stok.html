<div id="pageStok" class="page">
    <div class="card">
        <div class="card-body">
            <!-- Header + Tombol Tambah -->
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px;flex-wrap:wrap;">
                <div>
                    <div style="font-size:16px;font-weight:800;color:var(--primary-dark);">💊 Manajemen Stok Obat</div>
                    <div style="font-size:11px;color:var(--text-muted);">Kelola data, harga, dan stok obat klinik</div>
                </div>
                <button onclick="openModalObat()" style="display:flex;align-items:center;gap:6px;padding:8px 14px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;">
                    ➕ Tambah Obat
                </button>
            </div>

            <!-- Search + Filter -->
            <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;">
                <input type="text" id="stokSearch" placeholder="🔍 Cari nama obat..." class="form-control"
                    style="flex:1;min-width:150px;font-size:13px;"
                    oninput="renderDaftarObat()">
                <select id="stokFilterKategori" class="form-control" style="flex:0 0 140px;font-size:12px;" onchange="renderDaftarObat()">
                    <option value="">Semua Kategori</option>
                </select>
            </div>

            <!-- Ringkasan Statistik -->
            <div id="stokSummary" style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;"></div>

            <!-- Tabel / List Obat -->
            <div id="daftarObat" style="min-height:120px;">
                <div class="empty-state"><div class="empty-icon">⏳</div>Memuat data obat...</div>
            </div>
        </div>
    </div>

    <!-- ══ MODAL: TAMBAH / EDIT OBAT ══ -->
    <div id="modalObat" style="display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.45);overflow-y:auto;padding:16px;">
        <div style="background:#fff;border-radius:18px;max-width:500px;margin:0 auto;padding:22px 20px;box-shadow:0 8px 40px rgba(0,0,0,0.18);">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                <div style="font-size:15px;font-weight:800;color:var(--primary-dark);" id="modalObatTitle">➕ Tambah Obat Baru</div>
                <button onclick="closeModalObat()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-muted);">✕</button>
            </div>
            <input type="hidden" id="obat_id">

            <div class="row g-2">
                <div class="col-12">
                    <label class="form-label">Nama Obat <span style="color:red">*</span></label>
                    <input type="text" id="obat_nama" class="form-control" placeholder="Contoh: Amoxicillin 500mg">
                </div>
                <div class="col-6">
                    <label class="form-label">Kategori</label>
                    <input type="text" id="obat_kategori" class="form-control" list="list-kategori-obat" placeholder="Antibiotik">
                    <datalist id="list-kategori-obat"></datalist>
                </div>
                <div class="col-6">
                    <label class="form-label">Satuan</label>
                    <select id="obat_satuan" class="form-control">
                        <option value="tablet">Tablet</option>
                        <option value="kapsul">Kapsul</option>
                        <option value="botol">Botol</option>
                        <option value="tube">Tube</option>
                        <option value="sachet">Sachet</option>
                        <option value="ampul">Ampul</option>
                        <option value="strip">Strip</option>
                        <option value="pcs">Pcs</option>
                    </select>
                </div>
                <div class="col-6">
                    <label class="form-label">Harga Beli (Rp)</label>
                    <input type="number" id="obat_harga_beli" class="form-control" placeholder="0" min="0">
                </div>
                <div class="col-6">
                    <label class="form-label">Harga Jual (Rp)</label>
                    <input type="number" id="obat_harga_jual" class="form-control" placeholder="0" min="0">
                </div>
                <div class="col-6">
                    <label class="form-label">Stok Saat Ini</label>
                    <input type="number" id="obat_stok" class="form-control" placeholder="0" min="0">
                </div>
                <div class="col-6">
                    <label class="form-label">Stok Minimum ⚠️</label>
                    <input type="number" id="obat_stok_minimum" class="form-control" placeholder="5" min="0">
                </div>
                <div class="col-12">
                    <label class="form-label">Frekuensi Default</label>
                    <select id="obat_frekuensi_default" class="form-control">
                        <option value="1x1">1x1 (sekali sehari)</option>
                        <option value="2x1">2x1 (dua kali sehari)</option>
                        <option value="3x1" selected>3x1 (tiga kali sehari)</option>
                        <option value="3x2">3x2 (tiga kali sehari, 2 tablet)</option>
                        <option value="4x1">4x1 (empat kali sehari)</option>
                        <option value="1x1 malam">1x1 malam</option>
                        <option value="prn">Prn (bila perlu)</option>
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label">Keterangan</label>
                    <input type="text" id="obat_keterangan" class="form-control" placeholder="Sebelum / sesudah makan, dll.">
                </div>
            </div>

            <div style="display:flex;gap:8px;margin-top:16px;">
                <button onclick="simpanObat()" style="flex:1;padding:11px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;">
                    💾 Simpan Obat
                </button>
                <button onclick="closeModalObat()" style="padding:11px 18px;background:#f1f5f9;color:var(--text);border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;">
                    Batal
                </button>
            </div>
        </div>
    </div>

    <!-- ══ MODAL: TAMBAH STOK (RESTOCK) ══ -->
    <div id="modalRestock" style="display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.45);overflow-y:auto;padding:16px;">
        <div style="background:#fff;border-radius:18px;max-width:400px;margin:0 auto;padding:22px 20px;box-shadow:0 8px 40px rgba(0,0,0,0.18);">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                <div style="font-size:15px;font-weight:800;color:var(--primary-dark);">📦 Tambah Stok</div>
                <button onclick="closeModalRestock()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-muted);">✕</button>
            </div>
            <input type="hidden" id="restock_obat_id">
            <div id="restock_nama_obat" style="font-weight:700;color:var(--primary);margin-bottom:12px;font-size:13px;"></div>
            <div style="display:flex;flex-direction:column;gap:10px;">
                <div>
                    <label class="form-label">Jumlah Ditambahkan</label>
                    <input type="number" id="restock_jumlah" class="form-control" placeholder="100" min="1">
                </div>
                <div>
                    <label class="form-label">Harga Beli Baru (opsional)</label>
                    <input type="number" id="restock_harga" class="form-control" placeholder="Kosongkan jika tidak berubah" min="0">
                </div>
            </div>
            <div style="display:flex;gap:8px;margin-top:16px;">
                <button onclick="simpanRestock()" style="flex:1;padding:11px;background:var(--success);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;">
                    ✅ Tambah Stok
                </button>
                <button onclick="closeModalRestock()" style="padding:11px 18px;background:#f1f5f9;color:var(--text);border:none;border-radius:10px;font-size:13px;cursor:pointer;">
                    Batal
                </button>
            </div>
        </div>
    </div>
</div>
