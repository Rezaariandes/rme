<div id="pageHariIni" class="page">
        <div class="d-flex align-items-center justify-content-between mb-3 gap-2">
            <div style="width:135px;flex-shrink:0;">
                <label class="form-label small fw-bold text-muted text-uppercase mb-1">Pilih Tanggal</label>
                <input type="date" id="filterDate" class="form-control shadow-sm" onchange="fetchByDate()" style="padding:7px 10px;font-size:13px;">
            </div>
            <div class="stat-badge d-flex align-items-center gap-2 p-2 px-3 bg-white border rounded shadow-sm" style="flex-shrink:0;">
                <div class="text-end">
                    <div class="small fw-bold text-muted text-uppercase" style="font-size:9px;">Total Kunjungan</div>
                    <div class="fw-bolder text-primary" style="font-size:20px;line-height:1;" id="statTotal">0</div>
                </div>
                <div style="font-size:26px;line-height:1;">👥</div>
            </div>
        </div>
        <!-- Kolom pencarian nama pasien -->
        <div style="position:relative;margin-bottom:12px;">
            <span style="position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;">🔍</span>
            <input type="text" id="searchKunjungan" class="form-control shadow-sm"
                placeholder="Cari nama pasien..."
                oninput="
                    if(typeof _searchKunjungan !== 'undefined') {
                        _searchKunjungan = this.value;
                        if(typeof renderKunjunganHariIni === 'function') renderKunjunganHariIni();
                    }
                "
                style="padding:8px 12px 8px 34px;font-size:13px;border-radius:10px;">
        </div>
        <div class="card">
            <div class="card-header-section">📅 Daftar Kunjungan</div>
            <div class="card-body" id="listHariIni" style="padding:14px;display:flex;flex-direction:column;gap:0;">
                <div class="empty-state"><div class="empty-icon">📋</div>Menunggu data...</div>
            </div>
        </div>
    </div>
