<div id="pageBiaya" class="page">
    <div class="card">
        <div class="card-body">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px;flex-wrap:wrap;">
                <div>
                    <div style="font-size:16px;font-weight:800;color:var(--primary-dark);">🏷️ Tarif & Biaya Layanan</div>
                    <div style="font-size:11px;color:var(--text-muted);">Kelola tarif pemeriksaan, lab, administrasi, dan layanan lainnya</div>
                </div>
                <button onclick="openModalTarif()" style="display:flex;align-items:center;gap:6px;padding:8px 14px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;">
                    ➕ Tambah Tarif
                </button>
            </div>

            <!-- Filter kategori tabs -->
            <div id="biayaKategoriTabs" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;"></div>

            <!-- Daftar tarif per kategori -->
            <div id="daftarTarif" style="min-height:120px;">
                <div class="empty-state"><div class="empty-icon">⏳</div>Memuat tarif...</div>
            </div>
        </div>
    </div>

    <!-- ══ MODAL TAMBAH/EDIT TARIF ══ -->
    <div id="modalTarif" style="display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.45);overflow-y:auto;padding:16px;">
        <div style="background:#fff;border-radius:18px;max-width:440px;margin:0 auto;padding:22px 20px;box-shadow:0 8px 40px rgba(0,0,0,0.18);">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                <div style="font-size:15px;font-weight:800;color:var(--primary-dark);" id="modalTarifTitle">➕ Tambah Tarif</div>
                <button onclick="closeModalTarif()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-muted);">✕</button>
            </div>
            <input type="hidden" id="tarif_id">
            <div class="row g-2">
                <div class="col-12">
                    <label class="form-label">Nama Layanan <span style="color:red">*</span></label>
                    <input type="text" id="tarif_nama" class="form-control" placeholder="Contoh: Konsultasi Medis">
                </div>
                <div class="col-12">
                    <label class="form-label">Kategori <span style="color:red">*</span></label>
                    <select id="tarif_kategori" class="form-control" onchange="_onKategoriTarifChange(this.value)">
                        <option value="Pemeriksaan">🩺 Pemeriksaan</option>
                        <option value="Laboratorium">🔬 Laboratorium</option>
                        <option value="Obat">💊 Obat</option>
                        <option value="Administrasi">📋 Administrasi</option>
                        <option value="Tindakan">⚕️ Tindakan</option>
                        <option value="Lainnya">📌 Lainnya</option>
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label">Harga (Rp) <span style="color:red">*</span></label>
                    <input type="number" id="tarif_harga" class="form-control" placeholder="0" min="0">
                </div>
                <div class="col-12">
                    <label class="form-label">Keterangan</label>
                    <input type="text" id="tarif_keterangan" class="form-control" placeholder="Opsional">
                </div>
                <div class="col-12">
                    <label style="display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;cursor:pointer;">
                        <input type="checkbox" id="tarif_aktif" checked style="width:15px;height:15px;accent-color:var(--primary);">
                        Tarif aktif (akan dihitung otomatis di tagihan)
                    </label>
                </div>
            </div>
            <!-- Info tarif khusus Lab -->
            <div id="infoTarifLab" style="display:none;margin-top:10px;padding:10px;background:rgba(124,58,237,0.07);border-radius:10px;font-size:11px;color:#5b21b6;">
                💡 Untuk tarif lab, nama harus persis sama dengan nama item lab yang diaktifkan (mis: <b>GDS</b>, <b>Kolesterol</b>, <b>Asam Urat</b>, <b>HB</b>, dll.) agar dihitung otomatis.
            </div>
            <div style="display:flex;gap:8px;margin-top:16px;">
                <button onclick="simpanTarif()" style="flex:1;padding:11px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;">💾 Simpan</button>
                <button onclick="closeModalTarif()" style="padding:11px 18px;background:#f1f5f9;color:var(--text);border:none;border-radius:10px;font-size:13px;cursor:pointer;">Batal</button>
            </div>
        </div>
    </div>
</div>
