<div id="pageUser" class="page">
        <div class="card">
            <div class="card-header-section">➕ Tambah User Baru</div>
            <div class="card-body">
                <div class="form-group">
                    <label class="form-label">Nama Lengkap</label>
                    <input type="text" id="u_nama" class="form-control" placeholder="Nama user...">
                </div>
                <div class="form-group">
                    <label class="form-label">Jabatan</label>
                    <!-- Diisi dinamis oleh renderJabatanSelect() dari user.js saat halaman dibuka -->
                    <select id="u_jabatan" class="form-control">
                        <option value="Dokter">Dokter</option>
                        <option value="Admin">Admin</option>
                        <option value="Paramedis">Paramedis</option>
                    </select>
                    <div style="font-size:10px;color:var(--text-muted);margin-top:4px;">
                        💡 User dengan jabatan <strong>Dokter</strong> akan otomatis tercatat sebagai dokter pemeriksa di setiap kunjungan pasien (untuk integrasi Satu Sehat).
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">PIN (6 Digit)</label>
                    <input type="number" id="u_pin" class="form-control" placeholder="123456">
                </div>
                <button onclick="simpanUserBaru()" id="btnSimpanUser" class="btn-custom btn-primary-custom w-100 mt-3">💾 Simpan Akun User</button>
            </div>
        </div>
        <div class="card">
            <div class="card-header-section">👥 Daftar Akun Sistem</div>
            <div class="card-body" id="listUserContainer" style="padding:14px;display:flex;flex-direction:column;gap:0;">
                <div class="empty-state"><div class="empty-icon">⏳</div>Memuat data user...</div>
            </div>
        </div>
    </div>
