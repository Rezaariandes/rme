<div class="modal-overlay" id="modalRiwayat" onclick="if(event.target===this) closeModal()">
        <div class="modal-content">
            <div style="width:40px;height:4px;background:#e2e8f0;border-radius:2px;margin:0 auto 18px;"></div>
            <div class="d-flex justify-content-between align-items-center mb-3 pb-2 border-bottom">
                <div class="fw-bold text-primary" style="font-size:16px;" id="modalTitle">📋 Detail Rekam Medis</div>
                <button class="btn p-0 text-secondary" style="font-size:18px;" onclick="closeModal()">✕</button>
            </div>
            <div id="modalView">
                <div id="modalTanggalInfoView" class="mb-3 fw-bold text-primary" style="font-size:12px;">Tanggal: - | Waktu: -</div>
                <div class="detail-row"><div class="detail-label">Keluhan</div><div class="detail-value" id="viewKeluhan"></div></div>
                <div class="detail-row"><div class="detail-label">Pemeriksaan Fisik</div><div class="detail-value" id="viewFisik"></div></div>
                <div class="detail-row"><div class="detail-label">TTV & Antropometri</div><div class="detail-value" id="viewTtv"></div></div>
                <div class="detail-row"><div class="detail-label">Diagnosa</div><div class="detail-value text-danger" id="viewDiag"></div></div>
                <div class="detail-row"><div class="detail-label">Terapi & Obat</div><div class="detail-value" id="viewTerapi"></div></div>
                <div class="d-flex gap-2 mt-3">
                    <button class="btn-custom" style="flex:1;background:#e2e8f0;color:#475569;" onclick="closeModal()">Tutup</button>
                    <button class="btn-custom btn-warning-custom" style="flex:1;" onclick="toggleEditModal(true)">✏️ Edit Data</button>
                </div>
            </div>
            <div id="modalEdit" style="display:none;">
                <input type="hidden" id="modalIndex">
                <div id="modalTanggalInfoEdit" class="mb-3 fw-bold text-primary" style="font-size:12px;">Edit Data Tanggal: -</div>
                <div class="mb-2"><label class="form-label small fw-bold text-muted text-uppercase mb-1">Keluhan</label><textarea id="modalKeluhan" class="form-control" rows="2"></textarea></div>
                <div class="mb-3"><label class="form-label small fw-bold text-muted text-uppercase mb-1">Pemeriksaan Fisik</label><textarea id="modalFisik" class="form-control" rows="2"></textarea></div>
                <div class="row g-2 mb-3">
                    <div class="col-4"><label class="form-label small fw-bold text-muted text-uppercase mb-1">TD</label><input type="text" id="modalTd" class="form-control" placeholder="120/80"></div>
                    <div class="col-4"><label class="form-label small fw-bold text-muted text-uppercase mb-1">Nadi</label><input type="number" id="modalNadi" class="form-control"></div>
                    <div class="col-4"><label class="form-label small fw-bold text-muted text-uppercase mb-1">Suhu</label><input type="number" id="modalSuhu" class="form-control" step="0.1"></div>
                    <div class="col-4"><label class="form-label small fw-bold text-muted text-uppercase mb-1">RR</label><input type="number" id="modalRr" class="form-control"></div>
                    <div class="col-4"><label class="form-label small fw-bold text-muted text-uppercase mb-1">BB</label><input type="number" id="modalBb" class="form-control"></div>
                    <div class="col-4"><label class="form-label small fw-bold text-muted text-uppercase mb-1">TB</label><input type="number" id="modalTb" class="form-control"></div>
                </div>
                <div class="row g-2 mb-3">
                    <div class="col-6"><label class="form-label small fw-bold text-muted text-uppercase mb-1">Diagnosa Utama</label><input list="list-icd" id="modalDiag1" class="form-control"></div>
                    <div class="col-6"><label class="form-label small fw-bold text-muted text-uppercase mb-1">Diag. Sekunder</label><input list="list-icd" id="modalDiag2" class="form-control"></div>
                </div>
                <div class="mb-3"><label class="form-label small fw-bold text-muted text-uppercase mb-1">Terapi & Obat</label><textarea id="modalTerapi" class="form-control" rows="2"></textarea></div>
                <div class="d-flex gap-2 mt-2">
                    <button class="btn-custom" style="flex:1;background:#e2e8f0;color:#475569;" onclick="toggleEditModal(false)">Batal</button>
                    <button class="btn-custom btn-primary-custom" id="btnSaveModal" style="flex:2;" onclick="simpanEditModal()">💾 Simpan</button>
                </div>
            </div>
        </div>
    </div>
